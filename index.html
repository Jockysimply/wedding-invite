  <style>

      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #f7f4ef;
      color: #333;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 20px;
    }

    .card {
      background: #fff;
      border-radius: 18px;

      letter-spacing: 1px;

    .map a {
      display: block;
      border-radius: 12px;
      overflow: hidden;
      text-decoration: none;
    }

    .map img {
      width: 100%;
      display: block;
      border-radius: 12px;
    }

      margin-top: 8px;

        地点：太原兰博泰尔酒店
      </div>

      <!-- 文案 -->
      <div class="message">
嘉礼将成，良期已定。
两姓既合，百年有约。
不言山盟，天地自证；
未书海誓，岁月为凭。

谨以是日，行婚姻之仪。
不事喧阗，不尚繁华，
唯愿与至亲至友，共见此刻。

吉日
公元二〇二六年五月三十日
静候君至。

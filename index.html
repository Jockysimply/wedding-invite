<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<!-- WeChat Share Card (Open Graph) -->
<meta property="og:title" content="周少辰 ❤ 吴玥婚礼请柬" />
<meta property="og:description" content="嘉礼将成，良期已定。两姓既合，百年有约。谨以是日，行婚姻之仪。静候君至。" />
<meta property="og:image" content="https://jockysimply.github.io/wedding-invite/20260415-211014.jpg" />

<title>周少辰 ❤ 吴玥婚礼请柬</title>

<style>
body{
    margin:0;
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, Arial, sans-serif;
    background:#f7f4ef;
    color:#333;
}
.container{
    max-width:720px;
    margin:0 auto;
    padding:20px;
}
.card{
    background:white;
    border-radius:18px;
    box-shadow:0 8px 30px rgba(0,0,0,0.08);
    padding:24px;
}
.hero img{
    width:100%;
    border-radius:16px;
}
h1{
    text-align:center;
    font-weight:500;
    margin:24px 0 8px;
}
.names, .time, .venue{
    text-align:center;
    margin:6px 0;
    font-size:16px;
}
.message{
    margin:24px 0;
    line-height:1.9;
    white-space:pre-line;
    text-align:center;
}
.map-title{
    text-align:center;
    margin:24px 0 12px;
    font-size:18px;
}
.map iframe{
    width:100%;
    height:280px;
    border:0;
    border-radius:12px;
}

/* 新增：地图下方双按钮 */
.map-actions{
    margin-top:12px;
    display:flex;
    gap:10px;
}
.map-btn{
    flex:1;
    display:inline-block;
    text-align:center;
    text-decoration:none;
    color:#fff;
    border-radius:10px;
    height:40px;
    line-height:40px;
    font-size:14px;
}
.map-btn.tencent{
    background:#12b7f5;
}
.map-btn.amap{
    background:#00b578;
}

.footer{
    text-align:center;
    margin-top:18px;
    font-size:14px;
    color:#888;
}

@media (max-width:520px){
    .map-actions{
        flex-direction:column;
    }
}
</style>
</head>

<body>
<div class="container">
  <div class="card">

    <div class="hero">
      <img src="20260415-211014.jpg" alt="Wedding Photo" />
    </div>

    <h1>周少辰 ❤ 吴玥婚礼请柬</h1>
    <div class="names">周少辰，吴玥</div>
    <div class="time">2026年5月30日 12:00</div>
    <div class="venue">太原兰博泰尔酒店</div>

    <div class="message">
嘉礼将成，良期已定。
两姓既合，百年有约。
不言山盟，天地自证；
未书海誓，岁月为凭。

谨以是日，行婚姻之仪。
不事喧阗，不尚繁华，
唯愿与至亲至友，共见此刻。

吉日
公元二〇二六年五月三十日
静候君至。
    </div>

    <div class="map-title">婚礼地点</div>
    <div class="map">
      <iframe
        src="https://apis.map.qq.com/uri/v1/marker?marker=coord:37.87812,112.5635;title:兰博泰尔酒店;addr:山西省太原市杏花岭区府西街103号&referer=myapp">
      </iframe>
    </div>

    <div class="map-actions">
      <a
        class="map-btn tencent"
        href="https://apis.map.qq.com/uri/v1/marker?marker=coord:37.87812,112.5635;title:%E5%85%B0%E5%8D%9A%E6%B3%B0%E5%B0%94%E9%85%92%E5%BA%97;addr:%E5%B1%B1%E8%A5%BF%E7%9C%81%E5%A4%AA%E5%8E%9F%E5%B8%82%E6%9D%8F%E8%8A%B1%E5%B2%AD%E5%8C%BA%E5%BA%9C%E8%A5%BF%E8%A1%97103%E5%8F%B7&referer=myapp"
        target="_blank"
        rel="noopener"
      >腾讯地图导航</a>

      <a
        class="map-btn amap"
        href="https://uri.amap.com/marker?position=112.5635,37.87812&name=%E5%85%B0%E5%8D%9A%E6%B3%B0%E5%B0%94%E9%85%92%E5%BA%97&src=weddinginvite&coordinate=gaode"
        target="_blank"
        rel="noopener"
      >高德地图导航</a>
    </div>

    <div class="footer">
      敬备喜筵 恭候光临
    </div>

  </div>
</div>
</body>
</html>
